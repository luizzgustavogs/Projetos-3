<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Edenred</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
<main class="login-page">

    <div class="login-container">
        <div class="login-header">
            <span class="brand">Eden</span>
            <p class="subtitle">Acesse com os dados da sua empresa</p>
        </div>

        <!-- Mensagem de erro -->
        <div th:if="${erro}" class="login-erro" th:text="${erro}" style="color: #e65100; margin-bottom: 15px; font-weight: 600;"></div>

        <form class="login-form" action="/login" method="POST">
            <div class="form-group">
                <label for="cnpj">CNPJ</label>
                <input type="text" id="cnpj" name="cnpj" placeholder="00.000.000/0000-00" required>
            </div>

            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
            </div>

            <button type="submit" class="login-btn">Entrar</button>
        </form>

        <div class="login-footer">
            <a href="/" class="link-voltar">← Voltar</a>
        </div>

        <div class="admin-access">
            <div class="admin-divider">
                <span>ou</span>
            </div>
            <a href="/admin" class="btn-admin-login">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
                Painel Administrativo
            </a>
        </div>
    </div>

    <!-- Fundo decorativo -->
    <div class="bg-art bg-art-top" aria-hidden="true">
        <div class="bg-circle top-dark"></div>
        <div class="bg-circle top-medium"></div>
        <div class="bg-circle top-light"></div>
    </div>

    <div class="bg-art bg-art-bottom" aria-hidden="true">
        <div class="bg-circle bottom-back"></div>
        <div class="bg-circle bottom-middle"></div>
        <div class="bg-circle bottom-front"></div>
    </div>
</main>

<script>
    const cnpjInput = document.getElementById('cnpj');
    cnpjInput.addEventListener('input', (e) => {
        let value = e.target.value.replace(/\D/g, '');
        if (value.length > 14) value = value.slice(0, 14);
        
        if (value.length > 12) {
            value = value.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{2}).*/, '$1.$2.$3/$4-$5');
        } else if (value.length > 8) {
            value = value.replace(/^(\d{2})(\d{3})(\d{3})(\d{0,4}).*/, '$1.$2.$3/$4');
        } else if (value.length > 5) {
            value = value.replace(/^(\d{2})(\d{3})(\d{0,3}).*/, '$1.$2.$3');
        } else if (value.length > 2) {
            value = value.replace(/^(\d{2})(\d{0,3}).*/, '$1.$2');
        }
        e.target.value = value;
    });
</script>
</body>
</html>
