<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impacto Atual - Edenred</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/impacto.css">
</head>
<body>
<main class="impact-page">
    <header class="topbar">
        <a href="/" class="brand brand-logo" aria-label="Eden">
            <img src="/images/eden-logo.png" alt="Eden">
        </a>
        <div class="topbar-right">
            <span style="font-size: 0.8rem;" th:text="${nomeEmpresa}">Empresa</span>
            <a href="/logout" class="btn-logout-sm">SAIR</a>
        </div>
    </header>

    <th:block th:replace="~{fragments/breadcrumb :: progress(1)}"></th:block>

    <section class="form-section" id="impacto-container">
        <div class="form-header">
            <h1 class="title">Impacto Ambiental <span>Atual</span></h1>
            <p class="subtitle">Dados baseados no nível digital atual de <strong id="txt-digital">0%</strong></p>
        </div>

        <div class="empresa-info">
            <div class="info-grid">
                <div class="info-item"><p class="info-label">Colaboradores</p><p class="info-value" th:text="${colaboradores}">0</p></div>
                <div class="info-item"><p class="info-label">Benefícios</p><p class="info-value" th:text="${numeroBeneficios}">0</p></div>
                <div class="info-item"><p class="info-label">Tipo</p><p class="info-value" th:text="${multibeneficio ? 'Multi' : 'Separado'}">-</p></div>
                <div class="info-item"><p class="info-label">Total Cartões</p><p class="info-value" th:text="${totalCartoes}">0</p></div>
            </div>
        </div>

        <div class="results-grid">
            <div class="result-card"><p class="card-label">CO₂ Emitido</p><h2 class="card-value" id="res-co2">...</h2><p class="card-subtext">por ciclo de vida</p></div>
            <div class="result-card"><p class="card-label">Plástico</p><h2 class="value card-value" id="res-plastico">...</h2><p class="card-subtext">em cartões físicos</p></div>
            <div class="result-card"><p class="card-label">Emissões Logísticas</p><h2 class="card-value" id="res-logistica">...</h2><p class="card-subtext">na entrega dos cartões</p></div>
        </div>

        <div id="alert-banner" class="alert-banner" role="status"></div>

        <div class="actions">
            <a href="/simulacao" class="btn btn-dark">SIMULAR MELHORIAS</a>
        </div>
    </section>

    <div class="home-bg-art home-bg-art-left-mid" aria-hidden="true">
        <div class="home-bg-circle home-left-mid-back"></div>
        <div class="home-bg-circle home-left-mid-front"></div>
        <div class="home-bg-circle home-left-mid-detail"></div>
    </div>
</main>

<script>
    async function calcularImpacto() {
        try {
            const resposta = await fetch('/calcular-ajax', { method: 'POST' });
            if (resposta.ok) {
                const dados = await resposta.json();
                
                document.getElementById('res-co2').textContent = dados.co2;
                document.getElementById('res-plastico').textContent = dados.plastico;
                document.getElementById('res-logistica').textContent = dados.co2Transporte;
                const digitalAtual = Number.parseFloat(dados.digitalAtual);
                document.getElementById('txt-digital').textContent = Number.isInteger(digitalAtual) ? digitalAtual + "%" : dados.digitalAtual + "%";

                const alertBanner = document.getElementById('alert-banner');
                alertBanner.style.display = 'block';
                if (dados.condicaoRuim === "true") {
                    document.getElementById('impacto-container').classList.add('condicao-ruim');
                    alertBanner.classList.add('alert-bad');
                    alertBanner.classList.remove('alert-good');
                    alertBanner.textContent = '⚠ Nível de digitalização baixo! Sua empresa possui um impacto ambiental elevado.';
                } else {
                    alertBanner.classList.add('alert-good');
                    alertBanner.classList.remove('alert-bad');
                    alertBanner.textContent = 'Nível de digitalização alto. Sua empresa possui um impacto ambiental reduzido.';
                }
            }
        } catch (error) { console.error(error); }
    }
    calcularImpacto();
</script>
</body>
</html>
