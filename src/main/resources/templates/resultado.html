<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado - Edenred</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/impacto.css">
</head>
<body>
<main class="impact-page">
    <header class="topbar">
        <a href="/" class="brand">Eden</a> 
    </header>

    <section class="form-section" style="text-align: center; max-width: 800px;">
        <div class="form-header">
            <h1 class="title">Resultado da <span>Simulação</span></h1>
            <p class="mensagem-alerta sucesso" th:text="${mensagemSucesso}" style="display: inline-block; margin-top: 15px;"></p>
        </div>

        <div style="background: #ffffff; padding: 40px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-top: 24px;">
            <h2 style="font-size: 1.25rem; color: var(--text-dark); margin-bottom: 24px;">Impacto do cenário atual</h2>

            <div style="margin-bottom: 32px;">
                <p style="font-size: 1rem; color: var(--text-light); margin-bottom: 8px;">Quantidade estimada de cartões físicos em uso:</p>
                <strong style="font-size: 2.5rem; color: var(--primary-color);" th:text="${qtdCartoesFisicos}">0</strong>
            </div>

            <h3 style="font-size: 1rem; color: var(--text-dark); margin-bottom: 16px; text-align: left;">Detalhamento das Emissões:</h3>
            <div style="display: flex; justify-content: space-between; gap: 16px; margin-bottom: 32px;">
                
                <div style="background: #f8f9fa; padding: 20px; border-radius: 12px; flex: 1; border-top: 4px solid #F39C12;">
                    <p style="font-size: 0.9rem; color: var(--text-light); margin-bottom: 8px; font-weight: 600;">Produção</p>
                    <strong style="font-size: 1.5rem; color: #333;" th:text="${emissaoProducao}">0.0</strong><span style="font-size: 1rem; color: #777;">g</span>
                </div>
                
                <div style="background: #f8f9fa; padding: 20px; border-radius: 12px; flex: 1; border-top: 4px solid #3498DB;">
                    <p style="font-size: 0.9rem; color: var(--text-light); margin-bottom: 8px; font-weight: 600;">Transporte</p>
                    <strong style="font-size: 1.5rem; color: #333;" th:text="${emissaoTransporte}">0.0</strong><span style="font-size: 1rem; color: #777;">g</span>
                </div>
                
                <div style="background: #f8f9fa; padding: 20px; border-radius: 12px; flex: 1; border-top: 4px solid #9B59B6;">
                    <p style="font-size: 0.9rem; color: var(--text-light); margin-bottom: 8px; font-weight: 600;">Descarte</p>
                    <strong style="font-size: 1.5rem; color: #333;" th:text="${emissaoDescarte}">0.0</strong><span style="font-size: 1rem; color: #777;">g</span>
                </div>

            </div>

            <div style="padding-top: 24px; border-top: 1px solid #eee;">
                <p style="font-size: 1.1rem; color: var(--text-dark); font-weight: 600; margin-bottom: 8px;">Emissão Total de CO₂:</p>
                <strong style="font-size: 3.5rem; color: #E74C3C;" th:text="${emissoesCO2}">0.0</strong>
                <span style="color: #E74C3C; font-size: 1.5rem; font-weight: bold;">g</span>
            </div>
        </div>

        <div class="actions" style="margin-top: 40px;">
            <a href="/impacto" class="btn btn-primary" style="text-decoration: none;">Fazer nova simulação</a>
        </div>
    </section>

    <div class="bg-art bg-art-top" aria-hidden="true">
        <div class="bg-circle top-dark"></div>
        <div class="bg-circle top-medium"></div>
        <div class="bg-circle top-light"></div>
    </div>

    <div class="bg-art bg-art-bottom" aria-hidden="true">
        <div class="bg-circle bottom-back"></div>
        <div class="bg-circle bottom-middle"></div>
        <div class="bg-circle bottom-front"></div>
        <div class="bg-circle bottom-detail"></div>
    </div>
</main>
</body>
</html>
